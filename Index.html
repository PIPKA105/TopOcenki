<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Grades PRO</title>
    <style>
        :root {
            --tg-bg: #0e1621;
            --tg-header: #17212b;
            --tg-msg: #182533;
            --brawl-blue: #2b3a67;
            --accent: #4dc3ff;
            --yellow: #fdd835;
        }

        body {
            background-color: var(--brawl-blue);
            color: white;
            font-family: 'Arial Black', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; }
        .active { display: flex; }

        /* ИНТЕРФЕЙС ВХОДА */
        .input-box {
            background: #1a2340; border: 4px solid black; border-radius: 12px;
            color: var(--accent); font-size: 1.5rem; padding: 12px;
            width: 80%; max-width: 300px; margin: 10px 0; text-align: center;
        }

        .btn {
            background: var(--yellow); color: black; border: 5px solid black;
            border-radius: 15px; padding: 15px 40px; font-size: 1.5rem;
            margin: 20px 0; cursor: pointer; box-shadow: 0 6px 0 #000;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        /* ЭКСКЛЮЗИВНЫЕ ЭФФЕКТЫ */
        .elite-frame {
            border: 8px solid transparent !important;
            background-image: linear-gradient(#1a2340, #1a2340), 
                              linear-gradient(45deg, #fdd835, #ff8c00, #fdd835);
            background-origin: border-box;
            background-clip: content-box, border-box;
            animation: rotate-frame 3s linear infinite;
            position: relative;
        }

        .odnkl-badge {
            position: absolute; bottom: -5px; right: -5px;
            width: 45px; height: 45px; background: #fdd835;
            border: 3px solid black; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; z-index: 10; box-shadow: 0 4px 0 #000;
        }

        @keyframes rotate-frame {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* ЧАТ МОДЕРАЦИИ */
        .chat-header { background: var(--tg-header); width: 100%; padding: 15px; display: flex; align-items: center; border-bottom: 2px solid black; box-sizing: border-box; }
        .chat-body { flex-grow: 1; width: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; background: var(--tg-bg); }
        .msg { background: var(--tg-msg); padding: 10px; border-radius: 10px; margin-bottom: 10px; max-width: 85%; border: 1px solid #2b3a67; }

        /* ТАБЛИЦА */
        table { width: 90%; background: #1a2340; border-collapse: collapse; margin-top: 20px; border: 3px solid black; }
        th, td { padding: 12px; border: 1px solid black; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <h1 style="font-size: 3rem; text-shadow: 4px 4px 0 #000; margin-top: 50px;">BRAWL GRADES</h1>
        <input type="text" id="login-input" class="input-box" placeholder="ЛОГИН">
        <input type="password" id="pass-input" class="input-box" placeholder="ПАРОЛЬ">
        <button class="btn" onclick="checkAuth()">ИГРАТЬ</button>
    </div>

    <div id="avatar-screen" class="screen">
        <h2 id="welcome-text">ПРОФИЛЬ</h2>
        <div id="avatar-container" style="position: relative; margin: 20px;">
            <div id="preview" style="width: 150px; height: 150px; border: 6px solid black; border-radius: 50%; background: #1a2340 center; background-size: cover; cursor: pointer; display: flex; justify-content: center; align-items: center;" onclick="document.getElementById('file-input').click()">
                <span id="photo-icon" style="font-size: 3rem;">📸</span>
            </div>
            <div id="odnkl-star" class="odnkl-badge" style="display:none;">⭐</div>
        </div>
        <input type="file" id="file-input" accept="image/*" capture="user" style="display:none" onchange="loadPhoto(event)">
        <div id="user-tag" style="color: var(--accent); font-size: 1.2rem;">ИГРОК</div>
        <button id="send-btn" class="btn" style="display:none;" onclick="startChat()">ОТПРАВИТЬ ФОТО</button>
    </div>

    <div id="mod-chat" class="screen">
        <div class="chat-header">
            <div style="width:40px; height:40px; background:var(--yellow); border-radius:50%; margin-right:10px;"></div>
            <div>
                <div id="mod-status" style="font-weight: bold;">ОЖИДАНИЕ МОДЕРАТОРА</div>
                <div id="timer" style="color:var(--accent); font-size:0.8rem;">ИИ Gemini перехватит через: 60с</div>
            </div>
        </div>
        <div class="chat-body" id="chat-content">
            <div class="msg"><b>Система:</b> Фото загружено. Идет поиск свободного модератора...</div>
            <img id="chat-img" style="width: 100%; border-radius: 10px; display: none; border: 2px solid var(--accent); margin-top: 10px;">
        </div>
        <div id="mod-controls" style="padding: 20px; background: var(--tg-header); width: 100%; box-sizing: border-box; display: none; justify-content: space-around;">
            <button class="btn" style="background:#4caf50; font-size:1.2rem; margin:0;" onclick="finish('approve')">✅ ДА</button>
            <button class="btn" style="background:#f44336; font-size:1.2rem; margin:0;" onclick="finish('reject')">❌ НЕТ</button>
        </div>
    </div>

    <div id="top-screen" class="screen">
        <h1 style="color: var(--yellow);">TOP PLAYERS</h1>
        <table>
            <tr style="background: rgba(253, 216, 53, 0.3);"><td>1</td><td>👑 Stepan_Admin</td><td>999</td></tr>
            <tr style="color:var(--accent)"><td>2</td><td>🤖 Gemini_AI</td><td>43</td></tr>
            <tr><td>3</td><td>VANKA_MOD228</td><td>10</td></tr>
            <tr><td>4</td><td id="my-name-top">Hamaaa</td><td id="user-score">0</td></tr>
        </table>
        <button class="btn" onclick="location.reload()">ВЫХОД</button>
    </div>

    <script>
        const mods = { "CTEP_MOD228": "kirastepan", "VANKA_MOD228": "zczczc2" };
        let currentUser = "";
        let isMod = false;
        let timer;
        let timeLeft = 60;

        function checkAuth() {
            const login = document.getElementById('login-input').value;
            const pass = document.getElementById('pass-input').value;
            currentUser = login || "Игрок";
            
            if (mods[login] && mods[login] === pass) {
                isMod = true;
                document.getElementById('preview').classList.add('elite-frame');
                document.getElementById('odnkl-star').style.display = "flex";
                document.getElementById('user-tag').innerText = "ЭЛИТНЫЙ МОДЕРАТОР";
            }
            document.getElementById('my-name-top').innerText = currentUser;
            showScreen('avatar-screen');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadPhoto(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('preview').style.backgroundImage = `url(${reader.result})`;
                document.getElementById('photo-icon').style.display = "none";
                document.getElementById('send-btn').style.display = "block";
                document.getElementById('chat-img').src = reader.result;
                document.getElementById('chat-img').style.display = "block";
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function startChat() {
            showScreen('mod-chat');
            if (isMod) {
                document.getElementById('mod-controls').style.display = "flex";
                document.getElementById('mod-status').innerText = "РЕЖИМ ПРОВЕРКИ";
            }
            
            timeLeft = 60;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `ИИ Gemini перехватит через: ${timeLeft}с`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    aiVerdict();
                }
            }, 1000);
        }

        function aiVerdict() {
            const chat = document.getElementById('chat-content');
            chat.innerHTML += `<div class="msg" style="border: 2px solid var(--accent)"><b>🤖 ИИ Gemini:</b> Время вышло! Я проверил работу. Оценка принята: 5. Начислено +10 баллов и +15 бонус ИИ!</div>`;
            setTimeout(() => finish('approve', true), 2000);
        }

        function finish(result, byAi = false) {
            clearInterval(timer);
            if (result === 'approve') {
                document.getElementById('user-score').innerText = byAi ? 25 : 10;
            }
            showScreen('top-screen');
        }
    </script>
</body>
</html>
