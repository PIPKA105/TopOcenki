<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Grades SYSTEM</title>
    <style>
        :root { --brawl-blue: #2b3a67; --accent: #4dc3ff; --yellow: #fdd835; }
        body { background: var(--brawl-blue); color: white; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding-bottom: 30px; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Лог ИИ */
        #ai-log { background: #17212b; border: 2px solid var(--accent); border-radius: 10px; width: 90%; max-width: 400px; height: 80px; margin-bottom: 15px; padding: 10px; font-size: 0.8rem; overflow-y: auto; text-align: left; font-family: monospace; }
        
        .input-box { background: #1a2340; border: 4px solid black; border-radius: 10px; color: var(--accent); padding: 10px; margin: 5px; width: 80%; outline: none; }
        .btn { background: var(--yellow); color: black; border: 4px solid black; border-radius: 12px; padding: 10px 20px; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 0 #000; margin: 10px; }
        
        table { width: 100%; max-width: 400px; border-collapse: collapse; background: #1a2340; border: 3px solid black; }
        td, th { padding: 8px; border: 1px solid #000; }
        .mod-row { color: var(--yellow); }
        .controls { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <h1 style="color: var(--yellow); text-shadow: 3px 3px 0 #000;">BRAWL GRADES</h1>
        <input type="text" id="login" class="input-box" placeholder="ЛОГИН">
        <input type="password" id="pass" class="input-box" placeholder="ПАРОЛЬ">
        <button class="btn" onclick="login()">ВХОД В СИСТЕМУ</button>
    </div>

    <div id="main-screen" class="screen">
        <div id="ai-log"><b>[SYSTEM]:</b> Ожидание авторизации...</div>
        
        <div id="ava-border" style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid black; background: #555; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
            <span id="initials" style="font-size: 2.5rem;">?</span>
        </div>
        <h2 id="user-display-name" style="margin: 5px;">ИГРОК</h2>
        <div id="user-status" style="color: var(--accent); font-size: 0.9rem;">RANK: УЧЕНИК</div>

        <table>
            <thead><tr><th>Ученик 4-Б</th><th>Баллы</th></tr></thead>
            <tbody>
                <tr class="mod-row"><td>👑 Stepan_Admin</td><td>9999</td></tr>
                <tr>
                    <td><input type="text" value="Игрок 1" class="input-box" style="width:70px; padding:2px;"></td>
                    <td><span id="score-1">0</span>
                        <div class="controls"><button onclick="action(1, 1)" style="color:green;">+</button><button onclick="action(1, -1)" style="color:red;">-</button></div>
                    </td>
                </tr>
                <tr>
                    <td><input type="text" value="Игрок 2" class="input-box" style="width:70px; padding:2px;"></td>
                    <td><span id="score-2">0</span>
                        <div class="controls"><button onclick="action(2, 1)" style="color:green;">+</button><button onclick="action(2, -1)" style="color:red;">-</button></div>
                    </td>
                </tr>
            </tbody>
        </table>
        <button class="btn" onclick="location.reload()">ВЫХОД</button>
    </div>

    <script>
        const log = document.getElementById('ai-log');
        let currentUser = "";

        function addLog(msg) {
            log.innerHTML += `<br>> ${msg}`;
            log.scrollTop = log.scrollHeight;
        }

        function action(id, val) {
            let s = document.getElementById('score-' + id);
            let old = s.innerText;
            s.innerText = parseInt(old) + val;
            addLog(`Модератор ${currentUser} изменил балл: ${old} -> ${s.innerText}. Система подтвердила.`);
        }

        function login() {
            const l = document.getElementById('login').value.trim();
            const p = document.getElementById('pass').value;
            currentUser = l;

            document.getElementById('user-display-name').innerText = l;
            document.getElementById('initials').innerText = l.charAt(0).toUpperCase();

            if (l === "CTEP_MOD228" && p === "kirastepan") {
                document.getElementById('user-status').innerText = "ГЛАВНЫЙ АДМИН (ВЫСШИЙ ДОСТУП)";
                document.querySelectorAll('.controls').forEach(c => c.style.display = "block");
                addLog("Приветствую, Создатель. Система под твоим полным контролем.");
            } else if (p === "mod4b") {
                document.getElementById('user-status').innerText = "ИСПОЛНИТЕЛЬНЫЙ МОДЕРАТОР";
                document.querySelectorAll('.controls').forEach(c => c.style.display = "block");
                addLog(`Модератор ${l} подключен. Ожидаю внесения данных...`);
            } else {
                addLog(`Пользователь ${l} вошел как зритель.`);
            }
            showScreen('main-screen');
        }

        function showScreen(id) {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById(id).style.display = "flex";
        }
    </script>
</body>
</html>
