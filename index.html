<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Grades [PRIVATE]</title>
    <style>
        :root { --bg: #0e1621; --accent: #4dc3ff; --yellow: #fdd835; }
        body { background: #17212b; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }
        #ai-console { background: #000; border: 1px solid #444; border-radius: 8px; width: 90%; max-width: 400px; height: 100px; margin-bottom: 15px; padding: 10px; font-size: 0.8rem; overflow-y: auto; text-align: left; color: #ccc; font-family: monospace; }
        .input-box { background: #1a2340; border: 2px solid #333; border-radius: 5px; color: white; padding: 10px; margin: 5px; width: 85%; outline: none; }
        .btn { background: #444; color: white; border: 1px solid #666; border-radius: 5px; padding: 10px 20px; cursor: pointer; margin: 10px; font-size: 0.9rem; }
        .btn-action { background: none; border: 1px solid #555; color: white; padding: 2px 10px; cursor: pointer; font-weight: bold; }
        table { width: 100%; max-width: 400px; border-collapse: collapse; background: #1a2340; }
        td, th { padding: 10px; border: 1px solid #333; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <h2>BRAWL GRADES</h2>
        <p style="font-size: 0.7rem; color: #888;">АВТОРИЗАЦИЯ</p>
        <input type="text" id="login" class="input-box" placeholder="ЛОГИН">
        <input type="password" id="pass" class="input-box" placeholder="ПАРОЛЬ">
        <input type="password" id="code" class="input-box" placeholder="ЛИЧНЫЙ КОД">
        <button class="btn" onclick="auth()">ПОДТВЕРДИТЬ</button>
    </div>

    <div id="main-screen" class="screen">
        <div id="ai-console"><b>[AI]:</b> Ожидание данных...</div>
        
        <div style="margin-bottom: 15px;">
            <small id="user-info">User: ?</small>
        </div>

        <div id="signature-box" style="margin-bottom: 15px;"></div>

        <table>
            <thead><tr><th>Ученик</th><th>Баллы</th><th>+/-</th></tr></thead>
            <tbody id="students-list">
                </tbody>
        </table>

        <button class="btn" onclick="location.reload()" style="margin-top: 20px; font-size: 0.7rem;">ВЫХОД</button>
    </div>

    <script>
        const students = [
            { name: "Stepan", score: 0, id: 0 }
        ];

        // ТВОИ СКРЫТЫЕ ДАННЫЕ
        const access = {
            login: "CTEP_MOD228",
            pass: "kirastepan",
            code: "54556"
        };

        const consoleLog = document.getElementById('ai-console');

        function log(msg) {
            consoleLog.innerHTML += `<br>> ${msg}`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        function auth() {
            const l = document.getElementById('login').value.trim();
            const p = document.getElementById('pass').value;
            const c = document.getElementById('code').value.trim();

            if (l === access.login && p === access.pass && c === access.code) {
                startApp();
            } else {
                alert("Ошибка: Доступ запрещен.");
            }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('main-screen').style.display = "flex";
            document.getElementById('user-info').innerText = `ID: ${access.login} [MOD]`;
            
            log(`Сессия ${access.login} открыта.`);
            
            document.getElementById('signature-box').innerHTML = `
                <img src="https://i.postimg.cc/mD8z4yRj/image.png" style="width:90px; border:1px solid #444;">
                <p style="font-size:0.5rem; color:#888;">VERIFIED BY AI</p>
            `;
            
            renderTable();
        }

        function renderTable() {
            const list = document.getElementById('students-list');
            list.innerHTML = "";
            students.forEach(s => {
                list.innerHTML += `
                    <tr>
                        <td>${s.name}</td>
                        <td id="s-${s.id}">${s.score}</td>
                        <td>
                            <button class="btn-action" onclick="updateScore(${s.id}, 1)">+</button>
                            <button class="btn-action" onclick="updateScore(${s.id}, -1)">-</button>
                        </td>
                    </tr>
                `;
            });
        }

        function updateScore(id, val) {
            const student = students.find(x => x.id === id);
            const old = student.score;
            student.score += val;
            document.getElementById(`s-${id}`).innerText = student.score;
            log(`[LOG]: ${student.name} ${val > 0 ? '+' : ''}${val} (${old} -> ${student.score})`);
        }
    </script>
</body>
</html>
