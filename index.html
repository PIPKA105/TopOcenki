<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CTEP_DNS // CONFIGURATOR</title>
    <style>
        body { 
            background: #050505; color: #fff; 
            font-family: 'Impact', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* КАРТОЧКА В СТИЛЕ WOW OS */
        .config-panel { 
            border: 4px solid #ffcc00; padding: 40px; border-radius: 30px; 
            background: #111; box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
            max-width: 320px; width: 80%;
        }

        .title { font-size: 2.5rem; margin: 0; letter-spacing: 2px; -webkit-text-stroke: 1px #000; }
        .subtitle { font-family: monospace; color: #ffcc00; margin-bottom: 30px; font-size: 0.8rem; }

        .btn-install { 
            background: #ffcc00; color: #000; border: none; 
            padding: 20px 30px; font-size: 1.2rem; border-radius: 15px; 
            cursor: pointer; text-decoration: none; display: block; 
            box-shadow: 0 6px 0 #997a00; transition: 0.1s;
        }
        .btn-install:active { transform: translateY(4px); box-shadow: 0 2px 0 #997a00; }

        .device-info { margin-top: 25px; font-family: sans-serif; font-size: 0.7rem; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="config-panel">
        <h1 class="title">CTEP_DNS</h1>
        <div class="subtitle">XBOX & BS TUNNEL v1.0</div>
        
        <button class="btn-install" onclick="generateProfile()">УСТАНОВИТЬ ПРОФИЛЬ</button>
        
        <div class="device-info">
            TARGET: iOS / iPhone 13<br>
            STATUS: READY TO DEPLOY
        </div>
    </div>

    <script>
        function generateProfile() {
            // ВПИШИ СЮДА СВОИ DNS ДЛЯ XBOX И БРАВЛА
            const dnsServer = "176.99.11.77"; // Пример (замени на нужный!)

            const profileXML = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>DNSSettings</key>
            <dict>
                <key>DNSProtocol</key>
                <string>UDP</string>
                <key>ServerAddresses</key>
                <array>
                    <string>${dnsServer}</string>
                </array>
            </dict>
            <key>PayloadDescription</key>
            <string>Конфигурация DNS от CTEP_OG для обхода блокировок.</string>
            <key>PayloadDisplayName</key>
            <string>CTEP_DNS (Xbox/BS)</string>
            <key>PayloadIdentifier</key>
            <string>com.ctepog.dns.config</string>
            <key>PayloadType</key>
            <string>com.apple.dnsSettings.managed</string>
            <key>PayloadUUID</key>
            <string>${self.crypto.randomUUID()}</string>
            <key>PayloadVersion</key>
            <integer>1</integer>
        </dict>
    </array>
    <key>PayloadDisplayName</key>
    <string>CTEP_OG DNS PROFILE</string>
    <key>PayloadIdentifier</key>
    <string>com.ctepog.profile</string>
    <key>PayloadRemovalDisallowed</key>
    <false/>
    <key>PayloadType</key>
    <string>Configuration</string>
    <key>PayloadUUID</key>
    <string>${self.crypto.randomUUID()}</string>
    <key>PayloadVersion</key>
    <integer>1</integer>
</dict>
</plist>`;

            const blob = new Blob([profileXML], { type: 'application/x-apple-aspen-config' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'CTEP_DNS.mobileconfig';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            setTimeout(() => {
                alert("ПРОФИЛЬ СКАЧАН!\n1. Зайди в Настройки\n2. Профиль загружен\n3. Установить");
            }, 500);
        }
    </script>
</body>
</html>
