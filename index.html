<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Grades [OFFICIAL]</title>
    <style>
        :root { --bg: #0e1621; --accent: #4dc3ff; --yellow: #fdd835; }
        body { background: #17212b; color: white; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }
        #ai-console { background: #000; border: 2px solid var(--accent); border-radius: 10px; width: 90%; max-width: 400px; height: 120px; margin-bottom: 15px; padding: 10px; font-size: 0.7rem; overflow-y: auto; text-align: left; color: #0f0; font-family: monospace; }
        .input-box { background: #1a2340; border: 3px solid black; border-radius: 8px; color: white; padding: 10px; margin: 5px; width: 85%; outline: none; }
        .btn { background: var(--yellow); color: black; border: 3px solid black; border-radius: 10px; padding: 12px 25px; cursor: pointer; font-weight: bold; margin: 10px; box-shadow: 0 4px 0 #000; }
        table { width: 100%; max-width: 400px; border-collapse: collapse; background: #1a2340; border: 3px solid black; }
        td, th { padding: 10px; border: 1px solid #000; }
        .online-dot { height: 10px; width: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <h1 style="color: var(--yellow); text-shadow: 3px 3px 0 #000;">BRAWL GRADES</h1>
        <p style="font-size: 0.7rem; letter-spacing: 2px;">SERVER 4-B ONLINE</p>
        <input type="text" id="login" class="input-box" placeholder="ЛОГИН">
        <input type="password" id="pass" class="input-box" placeholder="ПАРОЛЬ">
        <input type="text" id="code" class="input-box" placeholder="КОД ИЗ ТГК (55575)">
        <button class="btn" onclick="auth()">VERIFY ACCESS</button>
    </div>

    <div id="main-screen" class="screen">
        <div id="ai-console"><b>[AI_CORE]:</b> Ожидание авторизации...</div>
        
        <div style="margin-bottom: 10px;">
            <span class="online-dot"></span> <small id="user-info">STATUS: OFFLINE</small>
        </div>

        <div id="signature-box" style="margin-bottom: 15px;"></div>

        <table>
            <thead><tr><th>Ученик 4-Б</th><th>Балл</th><th>+/-</th></tr></thead>
            <tbody id="students-list">
                </tbody>
        </table>

        <button class="btn" onclick="location.reload()" style="background: #444; color: white; margin-top: 20px;">ВЫЙТИ</button>
    </div>

    <script>
        // --- 1. РЕАЛЬНЫЙ СПИСОК 4-Б (БЕЗ ПРИМЕРОВ) ---
        const students = [
            { name: "👑 Stepan_Admin", score: 9999, id: 0 },
            // Вписывай сюда своих: { name: "Имя Фамилия", score: 0, id: 1 },
        ];

        // --- 2. БАЗА МОДЕРАТОРОВ (ЛИЧНЫЕ КОДЫ) ---
        const staff = {
            "Stepan": { pass: "kirastepan", code: "55575", role: "СОЗДАТЕЛЬ", sig: true },
            // Пример: "Ivan": { pass: "ivan2016", code: "11111", role: "МОДЕР", sig: false }
        };

        let currentSession = null;
        const consoleLog = document.getElementById('ai-console');

        function log(msg) {
            consoleLog.innerHTML += `<br>> ${msg}`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        function auth() {
            const l = document.getElementById('login').value.trim();
            const p = document.getElementById('pass').value;
            const c = document.getElementById('code').value;

            if (staff[l] && staff[l].pass === p && staff[l].code === c) {
                currentSession = staff[l];
                currentSession.name = l;
                startApp();
            } else {
                alert("ACCESS DENIED: Ошибка ключа или пароля!");
            }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('main-screen').style.display = "flex";
            document.getElementById('user-info').innerText = `${currentSession.name} (${currentSession.role})`;
            
            log(`Синхронизация: ${currentSession.name}... Успешно.`);
            log(`ИИ готов к обработке данных.`);
            
            if (currentSession.sig) {
                document.getElementById('signature-box').innerHTML = `
                    <img src="https://i.postimg.cc/mD8z4yRj/image.png" style="width:110px; border:2px solid gold; filter: drop-shadow(0 0 5px gold);">
                    <p style="font-size:0.5rem; color:gold; margin-top:5px;">DIGITAL SIGNATURE VERIFIED</p>
                `;
            }
            renderTable();
        }

        function renderTable() {
            const list = document.getElementById('students-list');
            list.innerHTML = "";
            students.forEach(s => {
                list.innerHTML += `
                    <tr>
                        <td>${s.name}</td>
                        <td id="s-${s.id}">${s.score}</td>
                        <td>
                            <button onclick="updateScore(${s.id}, 1)" style="color:green; background:none; border:1px solid green; padding:2px 8px; cursor:pointer;">+</button>
                            <button onclick="updateScore(${s.id}, -1)" style="color:red; background:none; border:1px solid red; padding:2px 8px; cursor:pointer;">-</button>
                        </td>
                    </tr>
                `;
            });
        }

        function updateScore(id, val) {
            const student = students.find(x => x.id === id);
            const old = student.score;
            student.score += val;
            document.getElementById(`s-${id}`).innerText = student.score;
            log(`[ИИ]: ${currentSession.name} применил ${val > 0 ? '+' : ''}${val} для ${student.name}.`);
        }
    </script>
</body>
</html>
