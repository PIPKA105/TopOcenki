name: Build Real Stepan Zoom
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Swift Code
        run: |
          # Пишем код камеры прямо в файл
          cat <<EOF > main.swift
          import UIKit
          import AVFoundation

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = UIViewController()
                  vc.view.backgroundColor = .black
                  let label = UILabel(frame: CGRect(x: 0, y: 0, width: 300, height: 100))
                  label.center = vc.view.center
                  label.textAlignment = .center
                  label.textColor = .green
                  label.text = "Stepan Zoom 1000x: Инициализация..."
                  vc.view.addSubview(label)
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

          # Компилируем в бинарный файл для ARM64 (iPhone)
          xcrun -sdk iphoneos swiftc main.swift -o StepanZoom -target arm64-apple-ios15.0
          
      - name: Create Package
        run: |
          mkdir -p Payload/StepanZoom.app
          mv StepanZoom Payload/StepanZoom.app/
          # Создаем правильный Info.plist
          cat <<EOF > Payload/StepanZoom.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>StepanZoom</string>
              <key>CFBundleIdentifier</key>
              <string>com.stepan.zoom1000x</string>
              <key>CFBundleName</key>
              <string>Stepan Zoom</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
          </dict>
          </plist>
          EOF
          zip -r StepanZoom.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Real-Stepan-App
          path: StepanZoom.ipa
