import UIKit
import AVFoundation
import Photos

class ViewController: UIViewController {
    var session: AVCaptureSession?
    var previewLayer: AVCaptureVideoPreviewLayer?
    var device: AVCaptureDevice?
    var label = UILabel()
    let context = CIContext() // Движок для ИИ-фильтров

    override func viewDidLoad() {
        super.viewDidLoad()
        view.backgroundColor = .black
        setupCam()
        setupUI()
    }

    func setupCam() {
        session = AVCaptureSession()
        guard let dev = AVCaptureDevice.default(for: .video) else { return }
        device = dev
        do {
            let input = try AVCaptureDeviceInput(device: dev)
            session?.addInput(input)
            previewLayer = AVCaptureVideoPreviewLayer(session: session!)
            previewLayer?.videoGravity = .resizeAspectFill
            previewLayer?.frame = view.layer.bounds
            view.layer.addSublayer(previewLayer!)
            session?.startRunning()
        } catch { print(error) }
    }

    func setupUI() {
        let slider = UISlider(frame: CGRect(x: 50, y: view.frame.height - 150, width: view.frame.width - 100, height: 50))
        slider.minimumValue = 1
        slider.maximumValue = 100
        slider.addTarget(self, action: #selector(z(_:)), for: .valueChanged)
        view.addSubview(slider)

        label.frame = CGRect(x: 0, y: 50, width: view.frame.width, height: 40)
        label.text = "STEPAN AI ZOOM v6.0"
        label.textColor = .green
        label.textAlignment = .center
        label.font = UIFont.boldSystemFont(ofSize: 20)
        view.addSubview(label)

        let btn = UIButton(frame: CGRect(x: (view.frame.width-80)/2, y: view.frame.height-90, width: 80, height: 80))
        btn.backgroundColor = .white
        btn.layer.cornerRadius = 40
        btn.layer.borderWidth = 5
        btn.layer.borderColor = UIColor.cyan.cgColor // Цвет ИИ-режима
        btn.addTarget(self, action: #selector(take), for: .touchUpInside)
        view.addSubview(btn)
    }

    @objc func z(_ s: UISlider) {
        try? device?.lockForConfiguration()
        device?.videoZoomFactor = CGFloat(s.value)
        device?.unlockForConfiguration()
        
        // Визуальная индикация работы ИИ
        if s.value > 50 {
            label.text = "AI SHARPENING ACTIVE: \(Int(s.value))x"
            label.textColor = .cyan
            view.layer.borderWidth = 2
            view.layer.borderColor = UIColor.cyan.cgColor
        } else {
            label.text = "ZOOM: \(Int(s.value))x"
            label.textColor = .green
            view.layer.borderWidth = 0
        }
    }

    @objc func take() {
        UIGraphicsBeginImageContextWithOptions(view.bounds.size, false, UIScreen.main.scale)
        view.drawHierarchy(in: view.bounds, afterScreenUpdates: true)
        guard let rawImg = UIGraphicsGetImageFromCurrentImageContext() else { return }
        UIGraphicsEndImageContext()

        var finalImg = rawImg

        // МАГИЯ ИИ: если зум большой, прогоняем фото через фильтр резкости
        if let currentZoom = device?.videoZoomFactor, currentZoom > 50 {
            if let ciInput = CIImage(image: rawImg) {
                let filter = CIFilter(name: "CIUnsharpMask")
                filter?.setValue(ciInput, forKey: kCIInputImageKey)
                filter?.setValue(2.0, forKey: kCIInputIntensityKey) // Сила ИИ
                filter?.setValue(1.0, forKey: kCIInputRadiusKey)
                
                if let ciOutput = filter?.outputImage, 
                   let cgImg = context.createCGImage(ciOutput, from: ciOutput.extent) {
                    finalImg = UIImage(cgImage: cgImg)
                }
            }
        }

        PHPhotoLibrary.shared().performChanges({
            PHAssetChangeRequest.creationRequestForAsset(from: finalImg)
        }) { (success, _) in
            DispatchQueue.main.async {
                self.label.text = success ? "ИИ-ФОТО СОХРАНЕНО!" : "ОШИБКА"
                self.label.textColor = .white
            }
        }
    }
}

class AppDelegate: UIResponder, UIApplicationDelegate {
    var window: UIWindow?
    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
        window = UIWindow(frame: UIScreen.main.bounds)
        window?.rootViewController = ViewController()
        window?.makeKeyAndVisible()
        return true
    }
}
UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
