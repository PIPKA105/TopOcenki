name: Build Stepan 1000x Zoom
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app
      - name: Create IPA
        run: |
          mkdir Payload
          # Тут мы имитируем сборку, создавая структуру
          echo "Stepan Zoom App" > Payload/StepanEye
          zip -r StepanEye.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Stepan-App-IPA
          path: StepanEye.ipa
