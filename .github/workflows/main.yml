name: Stepan_Zoom_Ultimate
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: CodeGen
        run: |
          cat <<EOF > main.swift
          import UIKit
          import AVFoundation
          import Photos

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ZoomVC()
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          class ZoomVC: UIViewController, AVCapturePhotoCaptureDelegate {
              var sess = AVCaptureSession()
              var out = AVCapturePhotoOutput()
              var dev: AVCaptureDevice?
              let info = UILabel()

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  setup()
                  ui()
              }

              func setup() {
                  guard let d = AVCaptureDevice.default(.builtInWideAngleCamera, for: .video, position: .back) else { return }
                  dev = d
                  do {
                      let inp = try AVCaptureDeviceInput(device: d)
                      if sess.canAddInput(inp) { sess.addInput(inp) }
                      if sess.canAddOutput(out) { sess.addOutput(out) }
                      let prev = AVCaptureVideoPreviewLayer(session: sess)
                      prev.frame = view.bounds
                      prev.videoGravity = .resizeAspectFill
                      view.layer.addSublayer(prev)
                      DispatchQueue.global().async { self.sess.startRunning() }
                  } catch { print(error) }
              }

              func ui() {
                  let s = UISlider(frame: CGRect(x: 40, y: view.frame.height-140, width: view.frame.width-80, height: 40))
                  s.minimumValue = 1; s.maximumValue = 100
                  s.addTarget(self, action: #selector(z), for: .valueChanged)
                  view.addSubview(s)

                  info.frame = CGRect(x: 0, y: 60, width: view.frame.width, height: 40)
                  info.text = "STEPAN AI 100x"; info.textColor = .cyan; info.textAlignment = .center
                  view.addSubview(info)

                  let b = UIButton(frame: CGRect(x: (view.frame.width-80)/2, y: view.frame.height-90, width: 80, height: 80))
                  b.backgroundColor = .white; b.layer.cornerRadius = 40
                  b.layer.borderWidth = 4; b.layer.borderColor = UIColor.cyan.cgColor
                  b.addTarget(self, action: #selector(t), for: .touchUpInside)
                  view.addSubview(b)
              }

              @objc func z(_ s: UISlider) {
                  try? dev?.lockForConfiguration()
                  dev?.videoZoomFactor = CGFloat(s.value)
                  dev?.unlockForConfiguration()
                  info.text = "ZOOM: \(Int(s.value))x"
              }

              @objc func t() {
                  out.capturePhoto(with: AVCapturePhotoSettings(), delegate: self)
              }

              func photoOutput(_ o: AVCapturePhotoOutput, didFinishProcessingPhoto p: AVCapturePhoto, error: Error?) {
                  if let d = p.fileDataRepresentation(), let i = UIImage(data: d) {
                      PHPhotoLibrary.shared().performChanges({ PHAssetChangeRequest.creationRequestForAsset(from: i) }) { ok, _ in
                          DispatchQueue.main.async { self.info.text = ok ? "ГОТОВО! ✅" : "ОШИБКА" }
                      }
                  }
              }
          }
          EOF
          
          xcrun -sdk iphoneos swiftc main.swift -o ZoomApp -target arm64-apple-ios15.0
          mkdir -p Payload/ZoomApp.app
          mv ZoomApp Payload/ZoomApp.app/
          
          cat <<EOF > Payload/ZoomApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>ZoomApp</string>
          <key>CFBundleIdentifier</key><string>com.stepan.zoom.new</string>
          <key>CFBundleName</key><string>Stepan Zoom</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>9.0</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>NSCameraUsageDescription</key><string>Нужна камера!</string>
          <key>NSPhotoLibraryUsageDescription</key><string>Нужна галерея!</string>
          </dict></plist>
          EOF
          zip -r StepanZoom.ipa Payload

      - name: Export
        uses: actions/upload-artifact@v4
        with:
          name: Stepan-Zoom-v9
          path: StepanZoom.ipa
