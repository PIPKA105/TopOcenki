name: Build Real Stepan Zoom
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Swift Code
        run: |
          cat <<EOF > main.swift
          import UIKit
          import AVFoundation
          import Photos

          class ViewController: UIViewController {
              var captureSession: AVCaptureSession?
              var videoPreviewLayer: AVCaptureVideoPreviewLayer?
              var captureDevice: AVCaptureDevice?
              var label = UILabel()

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  setupCamera()
                  setupUI()
              }

              func setupCamera() {
                  captureSession = AVCaptureSession()
                  guard let device = AVCaptureDevice.default(for: .video) else { return }
                  captureDevice = device
                  do {
                      let input = try AVCaptureDeviceInput(device: device)
                      captureSession?.addInput(input)
                      videoPreviewLayer = AVCaptureVideoPreviewLayer(session: captureSession!)
                      videoPreviewLayer?.videoGravity = .resizeAspectFill
                      videoPreviewLayer?.frame = view.layer.bounds
                      view.layer.addSublayer(videoPreviewLayer!)
                      captureSession?.startRunning()
                  } catch { print(error) }
              }

              func setupUI() {
                  let slider = UISlider(frame: CGRect(x: 50, y: view.frame.height - 150, width: view.frame.width - 100, height: 50))
                  slider.minimumValue = 1
                  slider.maximumValue = 100
                  slider.addTarget(self, action: #selector(zoomChanged(_:)), for: .valueChanged)
                  view.addSubview(slider)
                  
                  label.frame = CGRect(x: 0, y: 50, width: view.frame.width, height: 30)
                  label.text = "STEPAN ZOOM v3.0 AI"
                  label.textColor = .green
                  label.textAlignment = .center
                  view.addSubview(label)

                  let btn = UIButton(frame: CGRect(x: (view.frame.width-70)/2, y: view.frame.height-90, width: 70, height: 70))
                  btn.backgroundColor = .white
                  btn.layer.cornerRadius = 35
                  btn.addTarget(self, action: #selector(takePhoto), for: .touchUpInside)
                  view.addSubview(btn)
              }

              @objc func zoomChanged(_ s: UISlider) {
                  try? captureDevice?.lockForConfiguration()
                  captureDevice?.videoZoomFactor = CGFloat(s.value)
                  captureDevice?.unlockForConfiguration()
                  label.text = s.value > 50 ? "AI BOOST ACTIVE: \(Int(s.value))x" : "ZOOM: \(Int(s.value))x"
                  label.textColor = s.value > 50 ? .orange : .green
              }

              @objc func takePhoto() {
                  UIGraphicsBeginImageContextWithOptions(view.bounds.size, true, 0)
                  view.drawHierarchy(in: view.bounds, afterScreenUpdates: true)
                  if let img = UIGraphicsGetImageFromCurrentImageContext() {
                      PHPhotoLibrary.shared().performChanges({ PHAssetChangeRequest.creationRequestForAsset(from: img) })
                  }
                  UIGraphicsEndImageContext()
                  label.text = "ФОТО СОХРАНЕНО!"
              }
          }

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

          xcrun -sdk iphoneos swiftc main.swift -o StepanZoom -target arm64-apple-ios15.0
          
      - name: Create Package
        run: |
          mkdir -p Payload/StepanZoom.app
          mv StepanZoom Payload/StepanZoom.app/
          cat <<EOF > Payload/StepanZoom.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>StepanZoom</string>
          <key>CFBundleIdentifier</key><string>com.stepan.zoom1000x</string>
          <key>CFBundleName</key><string>Stepan Zoom</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>3.0</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>NSCameraUsageDescription</key><string>Для зума!</string>
          <key>NSPhotoLibraryAddUsageDescription</key><string>Для сохранения фото!</string>
          <key>NSPhotoLibraryUsageDescription</key><string>Для сохранения фото!</string>
          </dict></plist>
          EOF
          zip -r StepanZoom.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Stepan-AI-Photo-v3
          path: StepanZoom.ipa
