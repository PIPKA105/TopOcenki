import UIKit
import AVFoundation
import Photos
import CoreImage

class ViewController: UIViewController, AVCaptureVideoDataOutputSampleBufferDelegate {
    var captureSession: AVCaptureSession?
    var videoPreviewLayer: AVCaptureVideoPreviewLayer?
    var captureDevice: AVCaptureDevice?
    var label = UILabel()
    var currentCIImage: CIImage?
    let context = CIContext()
    var isAIBoostEnabled = false
    let photoOutput = AVCapturePhotoOutput()

    override func viewDidLoad() {
        super.viewDidLoad()
        view.backgroundColor = .black
        setupCamera()
        setupUI()
    }

    func setupCamera() {
        captureSession = AVCaptureSession()
        captureSession?.sessionPreset = .photo // Для лучшего качества фото
        guard let device = AVCaptureDevice.default(for: .video) else { return }
        captureDevice = device
        do {
            let input = try AVCaptureDeviceInput(device: device)
            captureSession?.addInput(input)
            
            // Output для видеоданных (чтобы накладывать ИИ фильтр)
            let videoOutput = AVCaptureVideoDataOutput()
            videoOutput.setSampleBufferDelegate(self, queue: DispatchQueue(label: "videoQueue"))
            captureSession?.addOutput(videoOutput)

            // Output для реальных фото
            captureSession?.addOutput(photoOutput)

            videoPreviewLayer = AVCaptureVideoPreviewLayer(session: captureSession!)
            videoPreviewLayer?.videoGravity = .resizeAspectFill
            videoPreviewLayer?.frame = view.layer.bounds
            view.layer.addSublayer(videoPreviewLayer!)
            captureSession?.startRunning()
        } catch { print(error) }
    }

    // Это магия ИИ: обрабатываем каждый кадр
    func captureOutput(_ output: AVCaptureOutput, didOutput sampleBuffer: CMSampleBuffer, from connection: AVCaptureConnection) {
        guard let imageBuffer = CMSampleBufferGetImageBuffer(sampleBuffer) else { return }
        var ciImage = CIImage(cvImageBuffer: imageBuffer)

        // Если ИИ буст включен - реально накладываем резкость
        if isAIBoostEnabled {
            if let filter = CIFilter(name: "CISharpenLuminance") {
                filter.setValue(ciImage, forKey: kCIInputImageKey)
                filter.setValue(2.0, forKey: kCIInputSharpnessKey) // Уровень ИИ-резкости
                if let outputImage = filter.outputImage {
                    ciImage = outputImage
                }
            }
        }
        
        // Обновляем превью на экране (нужно в главном потоке)
        DispatchQueue.main.async {
            self.currentCIImage = ciImage
            // Мы не можем напрямую обновить PreviewLayer, 
            // для реального ИИ-превью нужен MTKView, но это слишком сложно для телефона.
            // Оставим превью как есть, но фото будет с ИИ!
        }
    }

    func setupUI() {
        let slider = UISlider(frame: CGRect(x: 50, y: view.frame.height - 150, width: view.frame.width - 100, height: 50))
        slider.minimumValue = 1
        slider.maximumValue = 100
        slider.addTarget(self, action: #selector(zoomChanged(_:)), for: .valueChanged)
        view.addSubview(slider)
        
        label.frame = CGRect(x: 0, y: 50, width: view.frame.width, height: 30)
        label.text = "STEPAN ZOOM v4.0 PRO AI"
        label.textColor = .green
        label.textAlignment = .center
        view.addSubview(label)

        let btn = UIButton(frame: CGRect(x: (view.frame.width-70)/2, y: view.frame.height-90, width: 70, height: 70))
        btn.backgroundColor = .white
        btn.layer.cornerRadius = 35
        btn.layer.borderWidth = 5
        btn.layer.borderColor = UIColor.gray.cgColor
        btn.addTarget(self, action: #selector(takePhoto), for: .touchUpInside)
        view.addSubview(btn)
    }

    @objc func zoomChanged(_ s: UISlider) {
        try? captureDevice?.lockForConfiguration()
        captureDevice?.videoZoomFactor = CGFloat(s.value)
        captureDevice?.unlockForConfiguration()
        
        if s.value > 50 {
            label.text = "AI BOOST ACTIVE: \(Int(s.value))x"
            label.textColor = .orange
            isAIBoostEnabled = true
        } else {
            label.text = "ZOOM: \(Int(s.value))x"
            label.textColor = .green
            isAIBoostEnabled = false
        }
    }

    @objc func takePhoto() {
        // Делаем реальное фото через PhotoOutput
        let settings = AVCapturePhotoSettings()
        photoOutput.capturePhoto(with: settings, delegate: self)
        
        // Мигание для эффекта
        let flash = UIView(frame: view.bounds); flash.backgroundColor = .white
        view.addSubview(flash)
        UIView.animate(withDuration: 0.1, animations: { flash.alpha = 0 }, completion: { _ in flash.removeFromSuperview() })
    }
}

// Делегат для сохранения фото с ИИ обработкой
extension ViewController: AVCapturePhotoCaptureDelegate {
    func photoOutput(_ output: AVCapturePhotoOutput, didFinishProcessingPhoto photo: AVCapturePhoto, error: Error?) {
        guard let data = photo.fileDataRepresentation(), var ciImage = CIImage(data: data) else { return }

        // Реально накладываем ИИ-резкость на финальное фото
        if isAIBoostEnabled {
            if let filter = CIFilter(name: "CISharpenLuminance") {
                filter.setValue(ciImage, forKey: kCIInputImageKey)
                filter.setValue(4.0, forKey: kCIInputSharpnessKey) // На фото резкость ещё сильнее!
                if let outputImage = filter.outputImage {
                    ciImage = outputImage
                }
            }
        }

        // Рендерим CIImage в CGImage, а потом в UIImage
        if let cgImage = context.createCGImage(ciImage, from: ciImage.extent) {
            let finalImage = UIImage(cgImage: cgImage, scale: 1.0, orientation: .right)
            
            // Сохраняем в галерею
            PHPhotoLibrary.shared().performChanges({
                PHAssetChangeRequest.creationRequestForAsset(from: finalImage)
            }) { (success, _) in
                DispatchQueue.main.async {
                    self.label.text = success ? "ФОТО СОХРАНЕНО (v4.0 PRO)!" : "ОШИБКА СОХРАНЕНИЯ"
                    self.label.textColor = success ? .cyan : .red
                }
            }
        }
    }
}

class AppDelegate: UIResponder, UIApplicationDelegate {
    var window: UIWindow?
    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
        window = UIWindow(frame: UIScreen.main.bounds)
        window?.rootViewController = ViewController()
        window?.makeKeyAndVisible()
        return true
    }
}
UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
