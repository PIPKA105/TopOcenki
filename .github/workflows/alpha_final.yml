name: Alpha_Zoom_Final
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force Build
        run: |
          # Создаем код
          cat <<EOF > main.swift
          import UIKit
          import AVFoundation
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ a: UIApplication, didFinishLaunchingWithOptions l: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = AlphaVC()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          class AlphaVC: UIViewController {
              let s = AVCaptureSession(); var d: AVCaptureDevice?
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  guard let dev = AVCaptureDevice.default(.builtInWideAngleCamera, for: .video, position: .back) else { return }
                  d = dev
                  try? s.addInput(AVCaptureDeviceInput(device: dev))
                  let p = AVCaptureVideoPreviewLayer(session: s)
                  p.frame = view.bounds
                  p.videoGravity = .resizeAspectFill
                  view.layer.addSublayer(p)
                  DispatchQueue.global().async { self.s.startRunning() }
                  let sl = UISlider(frame: CGRect(x: 50, y: view.frame.height-100, width: view.frame.width-100, height: 50))
                  sl.minimumValue = 1; sl.maximumValue = 100
                  sl.addTarget(self, action: #selector(z), for: .valueChanged)
                  view.addSubview(sl)
              }
              @objc func z(_ sl: UISlider) {
                  try? d?.lockForConfiguration()
                  d?.videoZoomFactor = CGFloat(sl.value)
                  d?.unlockForConfiguration()
              }
          }
          EOF

          # Компиляция под архитектуру iPhone (arm64)
          SDK_PATH=\$(xcrun --sdk iphoneos --show-sdk-path)
          swiftc -target arm64-apple-ios15.0 -sdk \$SDK_PATH main.swift -o AlphaZoom -framework UIKit -framework AVFoundation
          
          # Упаковка
          mkdir -p Payload/AlphaZoom.app
          mv AlphaZoom Payload/AlphaZoom.app/
          echo '{"CFBundleExecutable":"AlphaZoom","CFBundleIdentifier":"com.alpha.zoom.v1","CFBundleName":"AlphaZoom","CFBundlePackageType":"APPL","CFBundleShortVersionString":"1.0","LSRequiresIPhoneOS":true,"NSCameraUsageDescription":"Zoom"}' > info.json
          plutil -convert xml1 info.json -o Payload/AlphaZoom.app/Info.plist
          zip -r AlphaZoom.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Alpha-Release
          path: AlphaZoom.ipa
